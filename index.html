<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaserMorph</title>
    <meta property="og:title" content="LaserMorph">
    <meta property="og:locale" content="en_US">
    <link rel="canonical" href="https://KiriInflate.github.io">
    <meta property="og:url" content="https://KiriInflate.github.io">
    <meta property="og:site_name" content="LaserMorph">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">

    <script src="https://d3js.org/d3.v6.js"></script>
    <script src="./js/d3DrawIcon.js"></script>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            max-width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            background-image: url('resources/img/slidescover/1U2A5947.JPG');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-size: calc(1728vw / 1728);
        }
        /* 重置 Bootstrap row 的负边距 */
        .row {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
        }
        /* 轮播图容器全屏 */
        #bgCarousel,
        .carousel-inner {
            margin: 0;
            padding: 0;
            width: 100% !important;
            max-width: 100%;
            height: 100vh;
        }
        /* 所有轮播项堆叠定位 */
        .carousel-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            opacity: 1;
            z-index: 1;
            transition: opacity 1s ease-in-out;
        }
        .carousel-item.active {
            opacity: 1;
            z-index: 2;
        }
        /* 下一张图片在最上层淡入 */
        .carousel-item.carousel-item-next,
        .carousel-item.carousel-item-prev {
            z-index: 3;
            opacity: 0;
        }
        .carousel-item.carousel-item-next.carousel-item-start,
        .carousel-item.carousel-item-prev.carousel-item-end {
            opacity: 1;
        }
        /* 当前图片保持显示，不做淡出 */
        .carousel-item.active.carousel-item-left,
        .carousel-item.active.carousel-item-right {
            opacity: 1;
            z-index: 2;
        }
        /* 轮播图片强制覆盖 */
        .carousel-item img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            color: white;
            font-size: 4.5rem;
            margin: 0;
        }

        h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            color: white;
            margin: 0;

            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .h3StylePTag {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            color: white;
            margin: 0;

            position: relative;
        }

        h3::after {
            content: "";
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: white;
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        h3:hover::after {
            transform: scaleX(1);
        }

        p {
            font-family: 'Noto Sans', sans-serif;
            color: white;
            font-size: 1rem;
        }

        .img-container {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-container img {
            max-height: 130%;
            max-width: 100%;
            height: auto;
            width: auto;
        }

        .row,
        .col {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .custom {
            padding: 0 12rem;
        }

        .title {
            font-size: 8rem;
        }

        .subtitle {
            font-size: 1.2rem;
        }

        .mgb1rem {
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .mgb1rem {
                margin-bottom: 2rem;
            }

            .custom {
                padding: 0;
            }

            .title {
                font-size: 18rem;
            }

            .subtitle {
                font-size: 3.6rem;
            }

            h3 {
                font-size: 4rem;
            }

        }

        @media (max-width: 480px) {
            .mgb1rem {
                margin-bottom: 1.8rem;
            }

            .custom {
                padding: 0;
            }

            .title {
                font-size: 16rem;
            }

            .subtitle {
                font-size: 2.4rem;
            }

            h3 {
                font-size: 3.6rem;
            }
        }
    </style>
    <!-- 预加载图片 -->
    <link rel="preload" as="image" href="resources/img/slidescover/1U2A5947.JPG">
    <link rel="preload" as="image" href="resources/img/slidescover/1U2A6313.JPG">
    <link rel="preload" as="image" href="resources/img/slidescover/1U2A6415.JPG">
    <link rel="preload" as="image" href="resources/img/slidescover/1U2A6558.JPG">
    <link rel="preload" as="image" href="resources/img/slidescover/475d07ab-12a9-4315-8fac-d273e7f66aa5.jpeg">
    <style>
        /* 页面加载时先显示第一张图片 */
        .carousel-item:first-child img {
            opacity: 1 !important;
        }
    </style>
</head>

<body>
    <div class="row" style="position: relative;">
        <!-- 轮播背景 -->
        <div id="bgCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel" data-bs-interval="3000" style="position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 0; margin: 0; padding: 0;">
            <div class="carousel-inner" style="width: 100%; height: 100vh; margin: 0; padding: 0;">
                <div class="carousel-item active" style="width: 100%; height: 100vh; margin: 0; padding: 0;">
                    <img src="resources/img/slidescover/1U2A5947.JPG">
                </div>
                <div class="carousel-item" style="width: 100%; height: 100vh; margin: 0; padding: 0;">
                    <img src="resources/img/slidescover/1U2A6313.JPG">
                </div>
                <div class="carousel-item" style="width: 100%; height: 100vh; margin: 0; padding: 0;">
                    <img src="resources/img/slidescover/1U2A6415.JPG">
                </div>
                <div class="carousel-item" style="width: 100%; height: 100vh; margin: 0; padding: 0;">
                    <img src="resources/img/slidescover/1U2A6558.JPG">
                </div>
                <div class="carousel-item" style="width: 100%; height: 100vh; margin: 0; padding: 0;">
                    <img src="resources/img/slidescover/475d07ab-12a9-4315-8fac-d273e7f66aa5.jpeg">
                </div>
            </div>
        </div>
        <!-- 内容层 -->
        <div style="position: relative; z-index: 1; display: flex; align-items: center; height: 100%; width: 100%;">
            <div class="custom">
                <div style="margin-bottom: 4rem;">
                    <h1 class="title mgb1rem" style="text-align: center; ">LaserMorph</h1>


                </div>
                <div style="display: flex; flex-direction: column; align-items:center;">
                    <div style="display: flex; " class="mgb1rem">
                        <a href="pages/subpage/MFGuide.html">
                            <h3>Mechanism and Fabrication</h3>
                        </a>
                    </div>
                    <div style="display: flex; " class="mgb1rem">
                        <a href="pages/subpage/library.html">
                            <h3>Design Space</h3>
                        </a>
                    </div>
                    <div style="display: flex; " class="mgb1rem">
                        <a href="pages/subpage/designTool.html">
                            <h3>Design Tool</h3>
                        </a>
                    </div>
                    <div style="display: flex; " class="mgb1rem">
                        <a href="pages/subpage/appExamples.html">
                            <h3>Application Examples</h3>
                        </a>
                    </div>

                </div>
            </div>
        </div>

    </div>
    </div>

    <script>
        drawIcon(50 * (window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth) / 1728, "icon", false, false);
        
        // 预加载所有轮播图片，确保切换时无延迟
        const images = [
            'resources/img/slidescover/1U2A5947.JPG',
            'resources/img/slidescover/1U2A6313.JPG',
            'resources/img/slidescover/1U2A6415.JPG',
            'resources/img/slidescover/1U2A6558.JPG',
            'resources/img/slidescover/475d07ab-12a9-4315-8fac-d273e7f66aa5.jpeg'
        ];
        let loadedCount = 0;
        images.forEach(src => {
            const img = new Image();
            img.onload = () => loadedCount++;
            img.src = src;
        });
        
        // 轮播切换时确保下一张图片已加载
        const carousel = document.getElementById('bgCarousel');
        carousel.addEventListener('slide.bs.carousel', function(e) {
            // 下一张图片立即显示
            const nextItem = e.relatedTarget;
            if (nextItem) {
                nextItem.style.opacity = '1';
            }
        });
    </script>

</body>

</html>
